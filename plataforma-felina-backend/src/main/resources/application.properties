spring.application.name=exament4

# ==============================================================================
# CONFIGURACIÓN DE LA BASE DE DATOS (MySQL)
# ==============================================================================
spring.datasource.url=jdbc:mysql://localhost:3306/plataforma_felina?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345678
# En Spring Boot 3 el driver se autodetecta, pero dejarlo no hace dảo
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================================
# CONFIGURACIÓN DE JPA / HIBERNATE
# ==============================================================================
# Hibernate 6 (Spring Boot 3) autodetecta el dialecto, pero es mejor dejarlo si quieres asegurar MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Muestra el SQL en consola
spring.jpa.show-sql=true
# MEJORA: Formatea el SQL para que sea legible y no una sola l̀nea infinita
spring.jpa.properties.hibernate.format_sql=true
# MEJORA: Ảade comentarios al SQL generado para saber quÈ operación lo disparó
spring.jpa.properties.hibernate.use_sql_comments=true

# Gestión del esquema (DDL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# ==============================================================================
# LOGGING
# ==============================================================================
# MEJORA: Permite ver los valores reales (? -> 'Inception') que se env̀an en las consultas
logging.level.org.hibernate.orm.results=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==============================================================================
# CONFIGURACIÓN JACKSON (JSON)
# ==============================================================================
# Evita errores al intentar serializar objetos Proxy de Hibernate (Lazy loading)
#spring.jackson.serialization.fail-on-empty-beans=false

# Formato de fechas global si no se usa @JsonFormat
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
