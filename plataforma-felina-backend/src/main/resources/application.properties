spring.application.name=exament4

# ==============================================================================
# SERVIDOR (Render inyecta PORT)
# ==============================================================================
server.port=${PORT:8080}

# ==============================================================================
# CONFIGURACION DE LA BASE DE DATOS (PostgreSQL en Render)
# ==============================================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/plataforma_felina}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================================================================
# CONFIGURACION DE JPA / HIBERNATE
# ==============================================================================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# ==============================================================================
# LOGGING
# ==============================================================================
logging.level.org.hibernate.SQL=INFO

# ==============================================================================
# CONFIGURACION JACKSON (JSON)
# ==============================================================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ==============================================================================
# UPLOADS DE IMAGENES (Cloudinary)
# ==============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# ==============================================================================
# GEMINI (Google AI Studio - tier gratuito)
# Obtener API key en https://aistudio.google.com/app/apikey
# ==============================================================================
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=gemini-1.5-flash

# ==============================================================================
# CORS
# ==============================================================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
