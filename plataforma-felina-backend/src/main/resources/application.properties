spring.application.name=exament4

# ==============================================================================
# CONFIGURACIï¿½N DE LA BASE DE DATOS (MySQL)
# ==============================================================================
spring.datasource.url=jdbc:mysql://mysql-db:3306/plataforma_felina?createDatabaseIfNotExist=true&serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true&authenticationPlugins=com.mysql.cj.jdbc.authentication.MysqlClearPasswordPlugin
spring.datasource.username=root
spring.datasource.password=12345678
# En Spring Boot 3 el driver se autodetecta, pero dejarlo no hace daï¿½o
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================================
# CONFIGURACIï¿½N DE JPA / HIBERNATE
# ==============================================================================
# Hibernate 6 (Spring Boot 3) autodetecta el dialecto, pero es mejor dejarlo si quieres asegurar MySQL 8+
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Muestra el SQL en consola
spring.jpa.show-sql=true
# MEJORA: Formatea el SQL para que sea legible y no una sola lï¿½nea infinita
spring.jpa.properties.hibernate.format_sql=true
# MEJORA: Aï¿½ade comentarios al SQL generado para saber quï¿½ operaciï¿½n lo disparï¿½
spring.jpa.properties.hibernate.use_sql_comments=true

# Gestiï¿½n del esquema (DDL)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true

# ==============================================================================
# LOGGING
# ==============================================================================
# MEJORA: Permite ver los valores reales (? -> 'Inception') que se envï¿½an en las consultas
logging.level.org.hibernate.orm.results=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ==============================================================================
# CONFIGURACION JACKSON (JSON)
# ==============================================================================
# Evita errores al intentar serializar objetos Proxy de Hibernate (Lazy loading)
#spring.jackson.serialization.fail-on-empty-beans=false

# Formato de fechas global si no se usa @JsonFormat
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ==============================================================================
# UPLOADS DE IMAGENES
# ==============================================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.uploads.dir=/app/uploads
app.uploads.public-base-url=http://localhost:8080
